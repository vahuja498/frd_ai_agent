name: Build and deploy Python app to Azure Web App - frdaiagent

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies locally (validation only)
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          echo "✅ All dependencies installed successfully"

      - name: Zip artifact (exclude antenv, let Oryx rebuild on Azure)
        run: |
          zip -r app.zip . \
            --exclude "antenv/*" \
            --exclude ".git/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc"

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: app.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_47571706E7D643178319E43A27474A8C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0C52956D2A754D4E9C7004C25EE618E9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B45CE0DFC84349229AE80C5968509C2F }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'frdaiagent'
          slot-name: 'Production'
          package: app.zip
