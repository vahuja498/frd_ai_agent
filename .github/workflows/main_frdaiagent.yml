name: Build and deploy Python app to Azure Web App - frdaiagent

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies for validation
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create clean deploy package
        run: |
          mkdir -p deploy
          rsync -av \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'antenv' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude 'tests' \
            --exclude 'docs' \
            --exclude '.env' \
            --exclude '.env.*' \
            ./ deploy/

      - name: Verify deploy contents
        run: |
          ls -la deploy
          test -f deploy/requirements.txt
          test -f deploy/app/main.py

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: deploy

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: frdaiagent
          package: deploy
